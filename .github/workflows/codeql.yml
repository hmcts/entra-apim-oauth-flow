name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches:
      - main

  schedule:
    - cron: '36 5 * * 4'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # Learn more about CodeQL language support at https://aka.ms/codeql-docs/language-support
        language: [ 'java' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      # Details on CodeQL's query packs refer to : https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
      # queries: security-extended,security-and-quality
      with:
        languages: ${{ matrix.language }}
        queries: security-extended


    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 21

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        gradle-version: current

    # Build the code so CodeQL can analyze it during compilation
    # Compile classes but skip test execution (CodeQL only needs compiled code, not running tests)
    - name: Build code
      run: gradle compileJava compileTestJava --no-daemon
      env:
        # Set dummy values for required environment variables during static analysis
        # CodeQL only needs the code to compile, not actual credentials
        TENANT_ID: "dummy-tenant-id"
        CLIENT_ID: "dummy-client-id"
        CLIENT_SECRET: "dummy-client-secret"
        API_APP_ID_URI: "api://dummy"
        APIM_BASE_URL: "https://dummy.example.com"
        SLUG: "/dummy/path"

    # ℹ️ Command-line programs to run using the OS shell.
    # 📚 See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun
    #   If the (auto)build fails above, remove it and uncomment the following three lines.
    #   modify them (or add more) to build your code if your project, please refer to the EXAMPLE below for guidance.
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"

    - uses: pmd/pmd-github-action@v2
      id: pmd
      with:
        rulesets: '.github/pmd-ruleset.xml'
        analyzeModifiedFilesOnly: false
        sourcePath: 'src/test/java'

    - name: Fail build if there are violations
      if: steps.pmd.outputs.violations != 0
      run: exit 1